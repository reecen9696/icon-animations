<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Icon set</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }
    header {
      padding: 32px 40px 8px;
    }
    h1 {
      font-size: 18px;
      font-weight: 500;
      margin: 0;
      color: var(--text);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      padding: 24px 40px 60px;
    }
    .tile {
      padding: 18px 12px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }
    .icons {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .icon-16 { width: 16px; height: 16px; display: block; position: relative; }
    .icon-24 { width: 24px; height: 24px; display: block; position: relative; }
    .icon-16.overflow, .icon-24.overflow { overflow: visible; }
    .lottie-mount { position: absolute; inset: 0; z-index: 1; }
    .lottie-mount.scaled {
      inset: auto;
      left: 50%;
      bottom: -25%;
      width: 210%;
      height: 210%;
      transform: translateX(-50%);
    }
    .on-top {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }
    .behind {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .behind > * {
      width: 100%;
      height: 100%;
      display: block;
      transform: scale(0);
      transform-origin: center;
      transition: transform 1000ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .behind.show > * {
      transform: scale(1);
      transition: transform 850ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .icon-16 > svg, .icon-24 > svg { position: relative; z-index: 1; }
    .label {
      font-size: 12px;
      color: var(--text);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <header><h1>Good</h1></header>
  <div class="grid" id="grid-good"></div>
  <header><h1>Icons</h1></header>
  <div class="grid" id="grid-main"></div>
  <header><h1>Work in progress</h1></header>
  <div class="grid" id="grid-wip"></div>

  <script>
    // Add new icons by dropping <name>.json into this folder and adding it to a section below.
    // Entries can be a string (file + label match) or { label, file } to reuse a JSON under a different name.
    const SECTIONS = {
      "grid-good": [
        { file: "fire", loop_file: "fireloop", behind: "4.svg" },
        { file: "newFire", on_top: "UserProfile.png", scale: 1.2, always_loop: true },
        "roulette",
        "wheel",
        "blitz",
        "diamonds",
        "baccarat",
        "mines",
      ],
      "grid-main": [
        "blackjack",
        "dice",
        { label: "advanced dice", file: "dice" },
        "keno",
      ],
      "grid-wip": [
        "plinko",
        "limbo",
      ],
    };

    const all_entries = Object.entries(SECTIONS).flatMap(([id, items]) =>
      items.map((entry) => [document.getElementById(id), entry])
    );

    for (const [grid, entry] of all_entries) {
      const label_text = typeof entry === "string" ? entry : (entry.label || entry.file);
      const file = typeof entry === "string" ? entry : entry.file;
      const tile = document.createElement("div");
      tile.className = "tile";

      const icons = document.createElement("div");
      icons.className = "icons";

      const on_top = typeof entry === "object" ? entry.on_top : null;
      const scaled = on_top || (typeof entry === "object" && entry.scale);

      const wrap16 = document.createElement("div");
      wrap16.className = "icon-16" + (scaled ? " overflow" : "");
      const mount16 = document.createElement("div");
      mount16.className = "lottie-mount" + (scaled ? " scaled" : "");
      wrap16.append(mount16);

      const wrap24 = document.createElement("div");
      wrap24.className = "icon-24" + (scaled ? " overflow" : "");
      const mount24 = document.createElement("div");
      mount24.className = "lottie-mount" + (scaled ? " scaled" : "");
      wrap24.append(mount24);

      const behind = typeof entry === "object" ? entry.behind : null;
      const behind_els = [];
      if (behind) {
        for (const wrap of [wrap16, wrap24]) {
          const b = document.createElement("div");
          b.className = "behind";
          const img = document.createElement("img");
          img.src = behind;
          img.alt = "";
          b.append(img);
          wrap.append(b);
          behind_els.push(b);
        }
      }

      if (on_top) {
        for (const wrap of [wrap16, wrap24]) {
          const img = document.createElement("img");
          img.className = "on-top";
          img.src = on_top;
          img.alt = "";
          wrap.append(img);
        }
      }

      icons.append(wrap16, wrap24);

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = label_text;

      tile.append(icons, label);
      grid.append(tile);

      const loop_file = typeof entry === "object" ? entry.loop_file : null;
      const always_loop = typeof entry === "object" ? entry.always_loop : false;

      if (always_loop) {
        [mount16, mount24].forEach((mount) => {
          lottie.loadAnimation({
            container: mount,
            renderer: "svg",
            loop: true,
            autoplay: true,
            path: `${file}.json`,
          });
        });
      } else if (loop_file) {
        [[mount16, behind_els[0]], [mount24, behind_els[1]]].forEach(([mount, behindEl]) => {
          let anim = null;

          const startLoop = () => {
            if (anim) anim.destroy();
            if (behindEl) behindEl.classList.remove("show");
            anim = lottie.loadAnimation({
              container: mount,
              renderer: "svg",
              loop: false,
              autoplay: true,
              path: `${loop_file}.json`,
            });
            anim.addEventListener("complete", () => startOneshot());
          };

          const startOneshot = () => {
            if (anim) anim.destroy();
            anim = lottie.loadAnimation({
              container: mount,
              renderer: "svg",
              loop: false,
              autoplay: true,
              path: `${file}.json`,
            });
            const grow_delay = 200;
            setTimeout(() => {
              if (behindEl) behindEl.classList.add("show");
            }, grow_delay);
            anim.addEventListener("DOMLoaded", () => {
              const duration_ms = anim.getDuration() * 1000;
              const shrink_before = 1100;
              setTimeout(() => {
                if (behindEl) behindEl.classList.remove("show");
              }, Math.max(0, duration_ms - shrink_before));
            });
            anim.addEventListener("complete", () => startLoop());
          };

          startLoop();
        });
      } else {
        const anims = [mount16, mount24].map((mount) => {
          const anim = lottie.loadAnimation({
            container: mount,
            renderer: "svg",
            loop: true,
            autoplay: false,
            path: `${file}.json`,
          });
          anim.addEventListener("DOMLoaded", () => anim.goToAndStop(0, true));
          const maybeReset = () => {
            if (anim._finishOnLoop) {
              anim._finishOnLoop = false;
              anim.goToAndStop(0, true);
            }
          };
          anim.addEventListener("loopComplete", maybeReset);
          anim.addEventListener("complete", maybeReset);
          return anim;
        });

        tile.addEventListener("mouseenter", () => {
          anims.forEach((a) => {
            a._finishOnLoop = false;
            a.play();
          });
        });
        tile.addEventListener("mouseleave", () => {
          anims.forEach((a) => {
            a._finishOnLoop = true;
          });
        });
      }
    }
  </script>
</body>
</html>
